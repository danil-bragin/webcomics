services:
  postgres:
    image: postgres:16-alpine
    container_name: dddcqrs-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"      # ready for streaming replication later
      - "-c"
      - "max_wal_senders=5"
      - "-c"
      - "max_replication_slots=5"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  # In dev there's a single Postgres; READ_DATABASE_URL is left empty so the
  # read pool falls back to the master. To test real master-slave locally,
  # uncomment a replica service and point READ_DATABASE_URL at it.
  #
  # postgres-replica:
  #   image: postgres:16-alpine
  #   ...

  redis:
    image: redis:7-alpine
    container_name: dddcqrs-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: webcomics-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - miniodata:/data

  worker-script:
    build: ./workers-py
    container_name: webcomics-worker-script
    environment:
      WORKER_TYPE: script
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: webcomics
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SCRIPT_DEFAULT_MODEL: ${SCRIPT_DEFAULT_MODEL:-openai/gpt-4o-mini}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8081/ready\").getcode()==200 else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker-image:
    build: ./workers-py
    environment:
      WORKER_TYPE: image
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: webcomics
      FAL_KEY: ${FAL_KEY:-}
      IMAGE_DEFAULT_MODEL: ${IMAGE_DEFAULT_MODEL:-fal-ai/flux/schnell}
      IMAGE_PRICE_USD: ${IMAGE_PRICE_USD:-0.003}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8081/ready\").getcode()==200 else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 3
    restart: unless-stopped

  worker-upload:
    build:
      context: ./workers-py
      dockerfile: Dockerfile.upload
    environment:
      WORKER_TYPE: upload
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: webcomics
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SELENIUM_HEADLESS: "true"
      GECKODRIVER_PATH: /usr/local/bin/geckodriver
    volumes:
      # Firefox profile(s) for selenium uploads. SocialAccount.firefox_profile_path
      # points to a subdir here, e.g. /profiles/youtube-main.
      - ./ops/firefox-profiles:/profiles:rw
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8081/ready\").getcode()==200 else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker-metrics:
    build:
      context: ./workers-py
      dockerfile: Dockerfile.upload   # same image, has Firefox + selenium deps
    environment:
      WORKER_TYPE: metrics
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: webcomics
      SELENIUM_HEADLESS: "true"
      GECKODRIVER_PATH: /usr/local/bin/geckodriver
    volumes:
      - ./ops/firefox-profiles:/profiles:rw
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8081/ready\").getcode()==200 else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  renderer:
    build: ./renderer-node
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: webcomics
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:8082/ready\", r => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # One-shot Firefox-in-browser used to perform the YouTube login that creates
  # the persistent profile the upload worker reuses. Start with:
  #   docker compose --profile setup up firefox-login
  # Then open http://localhost:5800, sign into YouTube, exit. The profile
  # subdirectory under ./ops/firefox-profiles/youtube-main/.mozilla/firefox/
  # is what you set as SocialAccount.firefox_profile_path (absolute path inside
  # the worker container = /profiles/youtube-main/.mozilla/firefox/<id>).
  firefox-login:
    image: jlesage/firefox:latest
    container_name: webcomics-firefox-login
    profiles: ["setup"]
    environment:
      DISPLAY_WIDTH: "1280"
      DISPLAY_HEIGHT: "900"
      KEEP_APP_RUNNING: "1"
    ports:
      - "5800:5800"
    volumes:
      - ./ops/firefox-profiles/youtube-main:/config:rw

  worker-caption:
    build: ./workers-py
    environment:
      WORKER_TYPE: caption
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: webcomics
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    restart: unless-stopped

  worker-audio:
    build: ./workers-py
    environment:
      WORKER_TYPE: audio
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: webcomics
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    restart: unless-stopped

  worker-music:
    build: ./workers-py
    environment:
      WORKER_TYPE: music
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: webcomics
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      WEB_API_URL: http://host.docker.internal:8080
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
