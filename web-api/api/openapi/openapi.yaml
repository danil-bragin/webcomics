      properties:
        id: { type: string }
        project_id: { type: string }
        name: { type: string }
        description: { type: string }
        traits:
          type: object
          additionalProperties: true
        ref_asset_ids:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    EnvironmentBody:
